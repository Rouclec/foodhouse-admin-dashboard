syntax = "proto3";

package ordersgrpc;

option go_package = "github.com/foodhouse/foodhouseapp/grpc/go/ordersgrpc";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "types/point.proto";
import "types/amount.proto";

enum OrderStatus {
  OrderStatus_UNSPECIFIED = 0;
  OrderStatus_CREATED = 1;
  OrderStatus_PAYMENT_SUCCESSFUL = 2;
  OrderStatus_PAYMENT_FAILED = 3;
  OrderStatus_IN_TRANSIT = 4;
  OrderStatus_DELIVERED = 5;
  OrderStatus_APPROVED = 6;
  OrderStatus_REJECTED = 7;
}

enum PaymentStatus {
  PaymentStatus_UNSPECIFIED = 0;
  PaymentStatus_INITIATED = 1;
  PaymentStatus_COMPLETED = 2;
  PaymentStatus_FAILED = 3;
  PaymentStatus_CANCELED = 4;
}

message OrderItem {
  string product_id = 2;
  int64 quantity = 3;
}

message Order {
  string order_number = 1;
  types.Point delivery_location = 2;
  types.Amount sum_total = 3;
  OrderStatus status = 4;
  int32 rating = 5;
  string review = 6;
  repeated OrderItem order_items = 7;
  string created_by = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  string secret_key = 11;
  string product_owner = 12;
  string payout_phone_number = 13;
  string dispatched_by = 14;
  types.Amount delivery_fee = 15;
  int32 total_items = 16;
}

message OrderAuditLog {
  google.protobuf.Timestamp timestamp = 1;
  string actor = 2;
  string action = 3;
  string reason = 4;
  Order before = 5;
  Order after = 6;
}

message CreateOrderRequest {
  string user_id = 1;
  repeated OrderItem order_items = 2;
  types.Point delivery_location = 3;
}

message CreateOrderResponse { Order order = 1; }

message GetOrderDetailsRequest {
  string user_id = 1;
  int64 order_number = 2;
}

message GetOrderDetailsResponse {
  Order order = 1;
  repeated OrderAuditLog audit_log = 2;
}

enum PaymentEntity {
  PaymentEntity_UNSPECIFIED = 0;
  PaymentEntity_ORDER = 1;
  PaymentEntity_SUBSCRIPTION = 2;
  PaymentEntity_COMMISSION = 3;
  PaymentEntity_REFUND = 4;
}

enum PaymentMethodType {
  PaymentMethodType_UNSPECIFIED = 0;
  PaymentMethodType_MOBILE_MONEY = 1;
  PaymentMethodType_ORANGE_MONEY = 2;
  PaymentMethodType_CREDIT_CARD = 3;
  PaymentMethodType_ACCOUNT_BALANCE = 4;
}

enum PaymentType {
  PaymentType_UNSPECIFIED = 0;
  PaymentType_CREDIT = 1;
  PaymentType_DEBIT = 2;
}

message Account {
  PaymentMethodType payment_method = 1;
  string account_number = 2;
}

message Payment {
  string id = 1;
  PaymentEntity payment_entity = 2;
  string entity_id = 3;
  types.Amount amount = 4;
  string created_by = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp expires_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  PaymentStatus status = 9;
  Account account = 10;
  PaymentType type = 11;
}

message InitiatePaymentRequest {
  PaymentEntity payment_entity = 1;
  string entity_id = 2;
  string user_id = 3;
  types.Amount amount = 4;
  Account account = 5;
}

message InitiatePaymentResponse { Payment payment = 1; }

message ListPaymentsRequest {
  string user_id = 1;
  string search_key = 2;
  int32 count = 3;
  string start_key = 4;
  PaymentStatus payment_status = 5;
  PaymentEntity payment_entity = 6;
  PaymentType payment_type = 7;
}

message ListPaymentsResponse {
  repeated Payment payments = 1;
  string next_key = 2;
}

message ConfirmPaymentRequest {
  string status = 1; // "SUCCESSFUL" or "FAILED",

  string reference = 2; // "Reference of the transaction. A valid UUID4",

  string amount = 3; //"Transaction amount",

  string currency = 4; //"Transaction currency",

  string operator = 5; // "MTN or ORANGE",

  string code = 6; // "CamPay Reference",

  string operator_reference = 7; // "Mobile Operator Reference"

  string signature =
      8; // "jwt token. You can validate this request that is coming from
         // CamPay by using your app webhook key to validate the jwt token"

  string endpoint = 9; // "collect" or "withdraw". This shows the kind of
                       // transaction that was performed. Deposits are
                       // "collect" while Withdrawals are "withdraw".

  string external_reference =
      10; // The reference on the platform that initiated the transaction.

  string phone_number = 11; // The phone number that initiated the transaction

  string order_id = 12; // This is the external id from TrustPayWay
}

message ConfirmPaymentResponse {}

message DispatchOrderRequest {
  int64 order_number = 1;
  string user_id = 2;
  string payout_phone_number = 3;
}

message DispatchOrderResponse {}

message ConfirmDeliveryRequest {
  string secret_key = 1;
  string user_id = 2;
}

message ConfirmDeliveryResponse {}

message ApproveOrderRequest {
  string order_id = 1;
  string user_id = 2;
}

message ApproveOrderResponse {}

message RejectOrderRequest {
  string order_id = 1;
  string user_id = 2;
  string reason = 3;
}

message RejectOrderResponse {}

message DeliveryPoint {
  string id = 1;
  types.Point address = 2;
  string delivery_point_name = 3;
  string city = 4;
  google.protobuf.Timestamp created_at = 5;
}

message CreateDeliveryPointRequest {
  types.Point address = 1;
  string city = 2;
  string delivery_point_name = 3;
  string user_id = 4;
}

message CreateDeliveryPointResponse { DeliveryPoint delivery_point = 1; }

message UpdateDeliveryPointRequest {
  string id = 1;
  types.Point address = 2;
  string city = 3;
  string delivery_point_name = 4;
  string user_id = 5;
}

message UpdateDeliveryPointResponse {}

message DeleteDeliveryPointRequest {
  string id = 1;
  string user_id = 2;
}

message DeleteDeliveryPointResponse {}

message ListDeliveryPointsRequest {
  string city = 1;
  string user_id = 2;
  int32 count = 3;
  string start_key = 4;
}

message ListDeliveryPointsResponse {
  repeated DeliveryPoint delivery_points = 1;
  string next_key = 2;
}

message ListDeliveryCitiesRequest {
  string user_id = 2;
  int32 count = 3;
  string start_key = 4;
}

message ListDeliveryCitiesResponse {
  repeated string cities = 1;
  string next_key = 2;
}

message HealthCheckRequest {}
message HealthCheckResponse {}

message ListUserOrdersRequest {
  string user_id = 1;
  int32 count = 2;
  string start_key = 3;
  repeated OrderStatus statuses = 4;
  string search_key = 5;
}

message ListUserOrdersResponse {
  repeated Order orders = 1;
  string next_key = 2;
}

message ListFarmerOrdersRequest {
  string farmer_id = 1;
  int32 count = 2;
  string start_key = 3;
  repeated OrderStatus statuses = 4;
  string search_key = 5;
}

message ListFarmerOrdersResponse {
  repeated Order orders = 1;
  string next_key = 2;
}

message ListOrdersRequest {
  string user_id = 1;
  int32 count = 2;
  string start_key = 3;
  repeated OrderStatus statuses = 4;
  string search_key = 5;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  string next_key = 2;
}

message CheckPaymentStatusRequest {
  string payment_id = 1;
  string user_id = 2;
}

message CheckPaymentStatusResponse { PaymentStatus status = 1; }

enum FilterType {
  FilterType_UNSPECIFIED = 0;
  FilterType_THIS_WEEK = 1;
  FilterType_THIS_MONTH = 2;
  FilterType_THIS_YEAR = 3;
  FilterType_ALL_TIME = 4;
}

message GetFarmerEarningsRequest {
  string farmer_id = 1;
  FilterType filter = 2; // "this_week", "this_month", etc.
}

message FarmerEarningsData {
  string date = 1;
  double value = 2;
}

message GetFarmerEarningsResponse { repeated FarmerEarningsData data = 1; }

message StatItem {
  string title = 1;
  double value = 2;
  double change = 3;
  string description = 4;
  optional string currency = 5;
}

message GetAdminStatsRequest { string user_id = 1; }
message GetAdminStatsResponse { repeated StatItem data = 1; }

message Commission {
  string id = 1;
  string referrer_id = 2;
  string reffered_id = 3;
  int64 order_number = 4;
  types.Amount commission_amount = 5;
  google.protobuf.Timestamp paid_at = 6;
  string payment_reference = 7;
  google.protobuf.Timestamp created_at = 8;
}

message ListCommissionsByReferrerRequest {
  string admin_user_id = 1;
  string referrer_id = 2;
  bool isPaid = 3;
}

message ListCommissionsByReferrerResponse {
  repeated Commission commissions = 1;
}

message BulkSettleCommissionsRequest {
  string admin_user_id = 1;
  repeated string commission_ids = 2;
}

message BulkSettleCommissionsResponse { string message = 1; }

message ListTotalComissionAmountByReferrerRequest {
  string admin_user_id = 1;
  string referrer_id = 2;
  bool isPaid = 3;
}

message ListTotalCommissionAmountByReferrerResponse {
  repeated types.Amount commissions = 1;
}

message EstimateDeliveryFeeRequest {
  string user_id = 1;
  repeated OrderItem order_items = 2;
  types.Point delivery_location = 3;
}

message EstimateDeliveryFeeResponse { types.Amount estimated_delivery_fee = 1; }

service Orders {

  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse) {
    option (google.api.http) = {
      post : "/v1/users/{user_id}/orders/create-order"
      body : "*"
    };
  }

  rpc GetOrderDetails(GetOrderDetailsRequest)
      returns (GetOrderDetailsResponse) {
    option (google.api.http) = {
      get : "/v1/users/{user_id}/orders/{order_number}/get-order-details"
    };
  }

  rpc ConfirmPayment(ConfirmPaymentRequest) returns (ConfirmPaymentResponse) {
    option (google.api.http) = {
      post : "/v1/public/confirm-payment"
      body : "*"
    };
  }

  rpc DispatchOrder(DispatchOrderRequest) returns (DispatchOrderResponse) {
    option (google.api.http) = {
      put : "/v1/users/{user_id}/orders/{order_number}/dispatch-order"
      body : "*"
    };
  }

  rpc ConfirmDelivery(ConfirmDeliveryRequest)
      returns (ConfirmDeliveryResponse) {
    option (google.api.http) = {
      put : "/v1/users/{user_id}/orders/{secret_key}/confirm-delivery"
      body : "*"
    };
  }

  rpc ApproveOrder(ApproveOrderRequest) returns (ApproveOrderResponse) {
    option (google.api.http) = {
      put : "/v1/users/{user_id}/orders/{order_id}/approve-order"
      body : "*"
    };
  }

  rpc RejectOrder(RejectOrderRequest) returns (RejectOrderResponse) {
    option (google.api.http) = {
      put : "/v1/users/{user_id}/orders/{order_id}/reject-order"
      body : "*"
    };
  }

  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse) {
    option (google.api.http) = {
      get : "/v1/public/orders/health-check"
    };
  }

  rpc ListUserOrders(ListUserOrdersRequest) returns (ListUserOrdersResponse) {
    option (google.api.http) = {
      get : "/v1/users/{user_id}/orders/list-user-orders"
    };
  }

  rpc ListFarmerOrders(ListFarmerOrdersRequest)
      returns (ListFarmerOrdersResponse) {
    option (google.api.http) = {
      get : "/v1/users/{farmer_id}/orders/list-farmer-orders"
    };
  }

  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse) {
    option (google.api.http) = {
      get : "/v1/admin/{user_id}/orders/list-orders"
    };
  }

  rpc InitiatePayment(InitiatePaymentRequest)
      returns (InitiatePaymentResponse) {
    option (google.api.http) = {
      post : "/v1/users/{user_id}/orders/initiate-payment"
      body : "*"
    };
  }

  rpc CreateDeliveryPoint(CreateDeliveryPointRequest)
      returns (CreateDeliveryPointResponse) {
    option (google.api.http) = {
      post : "/v1/admin/{user_id}/orders/create-delivery-point"
      body : "*"
    };
  }

  rpc UpdateDeliveryPoint(UpdateDeliveryPointRequest)
      returns (UpdateDeliveryPointResponse) {
    option (google.api.http) = {
      put : "/v1/admin/{user_id}/orders/{id}/update-delivery-point"
      body : "*"
    };
  }

  rpc DeleteDeliveryPoint(DeleteDeliveryPointRequest)
      returns (DeleteDeliveryPointResponse) {
    option (google.api.http) = {
      delete : "/v1/admin/{user_id}/orders/{id}/delete-delivery-point"
    };
  }

  rpc ListDeliveryPoints(ListDeliveryPointsRequest)
      returns (ListDeliveryPointsResponse) {
    option (google.api.http) = {
      get : "/v1/users/{user_id}/orders/list-delivery-points"
    };
  }

  rpc GetAdminStats(GetAdminStatsRequest) returns (GetAdminStatsResponse) {
    option (google.api.http) = {
      get : "/v1/admin/{user_id}/orders/get-admin-stats"
    };
  }

  rpc ListDeliveryCities(ListDeliveryCitiesRequest)
      returns (ListDeliveryCitiesResponse) {
    option (google.api.http) = {
      get : "/v1/users/{user_id}/orders/list-delivery-cities"
    };
  }

  rpc CheckPaymentStatus(CheckPaymentStatusRequest)
      returns (CheckPaymentStatusResponse) {
    option (google.api.http) = {
      get : "/v1/users/{user_id}/orders/{payment_id}/check-payment-status"
    };
  }

  rpc GetFarmerEarnings(GetFarmerEarningsRequest)
      returns (GetFarmerEarningsResponse) {
    option (google.api.http) = {
      get : "/v1/users/{farmer_id}/orders/get-farmer-earnings"
    };
  }

  rpc ListPayments(ListPaymentsRequest) returns (ListPaymentsResponse) {
    option (google.api.http) = {
      get : "/v1/admin/{user_id}/orders/list-payments"
    };
  }

  rpc ListCommissionsByReferrer(ListCommissionsByReferrerRequest)
      returns (ListCommissionsByReferrerResponse) {
    option (google.api.http) = {
      get : "/v1/admin/{admin_user_id}/orders/commission/{referrer_id}/"
            "list-commissions-by-referrer"
    };
  }

  rpc ListTotalComissionAmountByReferrer(
      ListTotalComissionAmountByReferrerRequest)
      returns (ListTotalCommissionAmountByReferrerResponse) {
    option (google.api.http) = {
      get : "/v1/admin/{admin_user_id}/orders/commission/{referrer_id}/"
            "list-total-commission-amount-by-referrer"
    };
  }

  rpc BulkSettleCommissions(BulkSettleCommissionsRequest)
      returns (BulkSettleCommissionsResponse) {
    option (google.api.http) = {
      post : "/v1/admin/{admin_user_id}/orders/commission/"
             "bulk-settle-commissions"
      body : "*"
    };
  }

  rpc EstimateDeliveryFee(EstimateDeliveryFeeRequest)
      returns (EstimateDeliveryFeeResponse) {
    option (google.api.http) = {
      post : "/v1/users/{user_id}/orders/estimate-delivery-fee"
      body : "*"
    };
  }
}
