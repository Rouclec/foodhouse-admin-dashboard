AWSTemplateFormatVersion: 2010-09-09
Description: "Creates in AWS Secrets Manager a secret for a third party service"
Parameters:
  EnvId:
    Type: String
    Description: Environment Id (used to namespace resources)
    AllowedPattern: "[a-z][a-z0-9]{2,19}"
    ConstraintDescription: Must be lower case letters between 3 and 20 characters.

Resources:
  FirebaseServiceAccountSecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Name: !Sub "/${EnvId}/firebase_service_account"
      GenerateSecretString:
        SecretStringTemplate: '{"type": "service_account","project_id": "placeholder","private_key_id": "Replace this entire json object with the service account json","private_key": "","client_email": "","client_id": "","auth_uri": "","token_uri": "","auth_provider_x509_cert_url": "","client_x509_cert_url": "","universe_domain": ""}'
        GenerateStringKey: "password"
        PasswordLength: 30
        ExcludePunctuation: true
      Tags:
        - Key: EnvId
          Value: !Ref EnvId

  FirebaseSdkSecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Name: !Sub "/${EnvId}/firebase_sdk"
      GenerateSecretString:
        SecretStringTemplate: '{"apiKey": "placeholder"}'
        GenerateStringKey: "password"
        PasswordLength: 30
        ExcludePunctuation: true
      Tags:
        - Key: EnvId
          Value: !Ref EnvId

  TwilioClientSecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Name: !Sub "/${EnvId}/twilio_client_secrets"
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"account_sid": "placeholder", "auth_token": "placeholder", "from_phone_number": "placeholder"}'
        GenerateStringKey: "password"
        PasswordLength: 30
        ExcludePunctuation: true
      Tags:
        - Key: EnvId
          Value: !Ref EnvId

  InfoBipClientSecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Name: !Sub "/${EnvId}/info_bip_client_secrets"
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"base_url": "placeholder", "api_key": "placeholder"}'
        GenerateStringKey: "password"
        PasswordLength: 30
        ExcludePunctuation: true
      Tags:
        - Key: EnvId
          Value: !Ref EnvId

  GoogleChatClientSecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Name: !Sub "/${EnvId}/google_chat_client_secrets"
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"webhook_url": "placeholder"}'
        GenerateStringKey: "password"
        PasswordLength: 30
        ExcludePunctuation: true
      Tags:
        - Key: EnvId
          Value: !Ref EnvId

  CampaySecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Name: !Sub "/${EnvId}/campay_secrets"
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "placeholder", "password": "placeholder", "base_url": "placeholder"}'
        GenerateStringKey: "password"
        PasswordLength: 30
        ExcludePunctuation: true
      Tags:
        - Key: EnvId
          Value: !Ref EnvId

  NexahClientSecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Name: !Sub "/${EnvId}/nexah_client_secrets"
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"base_url": "placeholder", "user": "placeholder", "sender_id", "placeholder"}'
        GenerateStringKey: "password"
        PasswordLength: 30
        ExcludePunctuation: true
      Tags:
        - Key: EnvId
          Value: !Ref EnvId



Outputs:
  FirebaseServiceAccountSecretArn:
    Description: "Firebase Secret ARN"
    Value: !Ref FirebaseServiceAccountSecret

  FirebaseSdkSecretArn:
    Description: "Firebase SDK Secret ARN"
    Value: !Ref FirebaseSdkSecret

  TwilioClientSecretArn:
    Description: "Twilio Secret ARN"
    Value: !Ref TwilioClientSecret

  GoogleChatClientSecretArn:
    Description: "Google Chat Secret ARN"
    Value: !Ref GoogleChatClientSecret
  
  CampaySecretArn:
    Description: "Campay Secret ARN"
    Value: !Ref CampaySecret

  InfoBipClientSecretArn:
    Description: "Infobip Secret ARN"
    Value: !Ref InfoBipClientSecret

  NexahClientSecretArn:
    Description: "Nexah Secret ARN"
    Value: !Ref NexahClientSecret
