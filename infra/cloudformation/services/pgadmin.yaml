AWSTemplateFormatVersion: 2010-09-09
Description: The PgAdmin service
Parameters:
  EnvId:
    Type: String
    Description: Environment Id (used to namespace resources)
    AllowedPattern: "[a-z][a-z0-9]{2,19}"
    ConstraintDescription: Must be lower case letters between 3 and 20 characters.

  VPC:
    Type: AWS::EC2::VPC::Id

  LogGroupName:
    Type: String
    Description: LogGroup name that should be use for the service

  ClusterArn:
    Type: String

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>


  DomainName:
    Type: String
    Description: The domain name for the environment where the service register a DNS record.

  LoadBalancerDNSName:
    Type: String
    Description: The DNS name of the load balancer that the service is registered with. A DNS record will created that points to this value.

  LoadBalancerCanonicalHostedZoneID:
    Type: String
    Description: The canonical hosted zone ID of the load balancer that the service is registered with.

  HttpsListener:
    Type: String
    Description: The ARN of the HTTPS listener that the service is registered with.


  # The following are optional parameters and are treated more like constants and input values.
  ContainerPort:
    Type: Number
    Default: 80

  AppName:
    Type: String
    Default: "pgadmin"

Resources:
  PgAdminSecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Name: !Sub "/${EnvId}/${AppName}_Secret"
      GenerateSecretString:
        SecretStringTemplate: '{"email": "admin@iknite.studio"}'
        GenerateStringKey: "password"
        PasswordLength: 30
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: EnvId
          Value: !Ref EnvId

  PgAdminTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      # Name of the task definition. Subsequent versions of the task definition are grouped together under this name.
      Family: !Sub "${EnvId}-${AppName}"
      NetworkMode: bridge
      RequiresCompatibilities:
        - EC2
      Memory: 256 # This was determined experimentally. PgAdmin will crash will less than 150MB
      ExecutionRoleArn: !Ref PgAdminExecutionRole
      # "The Amazon Resource Name (ARN) of an AWS Identity and Access Management (IAM) role that grants containers in the task permission to call AWS APIs on your behalf."
      TaskRoleArn: !Ref PgAdminTaskRole
      ContainerDefinitions:
        - Name: PgAdmin
          Image: "dpage/pgadmin4"
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Name: pgadmin
          # Send logs to CloudWatch Logs
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-region: !Ref AWS::Region
              awslogs-group: !Ref LogGroupName
              awslogs-stream-prefix: !Ref AppName
          Environment:
            - Name: PGADMIN_PORT
              Value: !Ref ContainerPort
          Secrets:
            - Name: PGADMIN_DEFAULT_PASSWORD
              ValueFrom: !Sub "${PgAdminSecret}:password::"
            - Name: PGADMIN_DEFAULT_EMAIL
              ValueFrom: !Sub "${PgAdminSecret}:email::"

    # A role needed by ECS to Start the Ecs Service
  PgAdminExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-EcsExecutionRole"
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"
      Policies:
        - PolicyName: root
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "secretsmanager:GetResourcePolicy"
                  - "secretsmanager:GetSecretValue"
                  - "secretsmanager:DescribeSecret"
                  - "secretsmanager:ListSecretVersionIds"
                  - "secretsmanager:ListSecrets"
                Resource:
                  - !Ref PgAdminSecret

  # A role for the containers
  PgAdminTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvId}-${AppName}-TaskRole"
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action:
              - "sts:AssumeRole"

  PgAdminEcsService:
    Type: AWS::ECS::Service
    DependsOn: [PgAdminTargetGroup, PgAdminListenerRule]
    Properties:
      ServiceName: !Sub "${EnvId}-${AppName}"
      Cluster: !Ref ClusterArn
      TaskDefinition: !Ref PgAdminTaskDefinition
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      DesiredCount: 0
       # This may need to be adjusted if the container takes a while to start up
      HealthCheckGracePeriodSeconds: 600
      LaunchType: EC2
      LoadBalancers:
        - ContainerName: PgAdmin
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref PgAdminTargetGroup

  PgAdminTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckIntervalSeconds: 10
      HealthCheckPath: "/misc/ping"
      HealthCheckTimeoutSeconds: 5
      UnhealthyThresholdCount: 2
      HealthyThresholdCount: 2
      Name: !Sub "${AppName}-tg"
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: 60 # default is 300
      TargetType: instance
      VpcId: !Ref VPC

  PgAdminListenerRule:
    Type: "AWS::ElasticLoadBalancingV2::ListenerRule"
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref PgAdminTargetGroup
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Sub "pgadmin.${DomainName}"
      ListenerArn: !Ref HttpsListener
      Priority: 4

  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub "${DomainName}."
      Name: !Sub "pgadmin.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !Ref LoadBalancerDNSName
        HostedZoneId: !Ref LoadBalancerCanonicalHostedZoneID
