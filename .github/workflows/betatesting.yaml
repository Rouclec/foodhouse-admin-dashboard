name: Build and submit to beta testing

on:
  push:
    branches:
      - release/testing/*
  workflow_dispatch:

jobs:
  build-and-submit-main-app:
    name: Build and submit main app
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check if 'mobile' directory changed
        id: changes
        run: |
          echo "changed=false" >> $GITHUB_OUTPUT
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^mobile/' ; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no changes in 'mobile'
        if: steps.changes.outputs.changed != 'true'
        run: echo "No changes in 'mobile' directory, skipping build."

      - name: Check for EXPO_TOKEN
        if: steps.changes.outputs.changed == 'true'
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to this project's Expo account in this repo's secrets. Learn more: https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi

      - name: Checkout repository
        if: steps.changes.outputs.changed == 'true'
        uses: actions/checkout@v2

      - name: Cache node modules
        if: steps.changes.outputs.changed == 'true'
        id: cache-npm
        uses: actions/cache@v3
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('mobile/**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      
      - if: steps.changes.outputs.changed == 'true' && steps.cache-npm.outputs.cache-hit == 'false'
        name: List the state of node modules
        continue-on-error: true
        working-directory: mobile
        run: yarn list

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: mobile
        run: yarn install

      - name: Setup Expo
        if: steps.changes.outputs.changed == 'true'
        uses: expo/expo-github-action@v7
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build and Submit
        if: steps.changes.outputs.changed == 'true'
        working-directory: mobile
        run: eas build --platform android --profile production --auto-submit --non-interactive --no-wait

  build-and-submit-agent-app:
    name: Build and submit agent app
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check if 'agentsApp' directory changed
        id: changes
        run: |
          echo "changed=false" >> $GITHUB_OUTPUT
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^agentsApp/' ; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no changes in 'agentsApp'
        if: steps.changes.outputs.changed != 'true'
        run: echo "No changes in 'agentsApp' directory, skipping build."

      - name: Check for EXPO_TOKEN
        if: steps.changes.outputs.changed == 'true'
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to this project's Expo account in this repo's secrets. Learn more: https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi

      - name: Checkout repository
        if: steps.changes.outputs.changed == 'true'
        uses: actions/checkout@v2

      - name: Cache node modules
        if: steps.changes.outputs.changed == 'true'
        id: cache-npm
        uses: actions/cache@v3
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('agentsApp/**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - if: steps.changes.outputs.changed == 'true' && steps.cache-npm.outputs.cache-hit == 'false'
        name: List the state of node modules
        continue-on-error: true
        working-directory: agentsApp
        run: yarn list

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: agentsApp
        run: yarn install

      - name: Setup Expo
        if: steps.changes.outputs.changed == 'true'
        uses: expo/expo-github-action@v7
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build and Submit
        if: steps.changes.outputs.changed == 'true'
        working-directory: agentsApp
        run: eas build --platform android --profile production --auto-submit --non-interactive --no-wait
