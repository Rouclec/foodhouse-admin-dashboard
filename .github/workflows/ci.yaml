name: CI Workflow

on:
  push:
    branches:
      - "main"
      - "release/*"
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 21

      - name: Cache Node Modules
        uses: actions/cache@v4
        env:
          cache-name: cache-yarn
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: List dependencies if cache is missing on mobile (Informational)
        if: steps.cache-node-modules.outputs.cache-hit == 'false'
        continue-on-error: true
        working-directory: mobile
        run: yarn list
      
      - name: List dependencies if cache is missing on admindashboard (Informational)
        if: steps.cache-node-modules.outputs.cache-hit == 'false'
        continue-on-error: true
        working-directory: admindashboard
        run: yarn list

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.3"

      - name: Cache Go Modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: make install-dependencies

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.62.2

      - name: Run ESLint
        run: make lint

      - name: Run Tests
        run: make test